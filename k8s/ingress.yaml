apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restaurant-ingress
  labels:
    app: restaurant
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # WebSocket support configurations
    nginx.ingress.kubernetes.io/websocket-services: "backend-service"
    # Allow uploads up to 10 Megabytes (essential for menu item image uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Standard header adjustments
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # Automatically redirect HTTP to HTTPS once TLS is configured
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  # Once you configure a TLS Certificate (e.g. via cert-manager and Let's Encrypt),
  # uncomment the tls block below and apply a certificate to secure the site.
  # tls:
  #   - hosts:
  #       - restaurant.scs-solutions.eu
  #     secretName: restaurant-tls-secret
  rules:
    - host: restaurant.scs-solutions.eu
      http:
        paths:
          # Route Django API requests
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          
          # Route WebSockets (waiters, kitchen, bar channels)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # Route Django Admin interface
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # Route Django static and media files
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          - path: /media
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

          # Route React SPA Frontend requests (must be listed last as general fallback)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
